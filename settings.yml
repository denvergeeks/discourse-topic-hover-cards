# -------------------------------------------------------
# Discourse Topic Hover Cards — Settings
# -------------------------------------------------------

# --- Card dimensions ---
card_width:
  type: string
  default: 32rem
  description: "Any valid CSS width, e.g. 420px, 32rem, 40vw, clamp(18rem, 40vw, 28rem)."

card_max_height:
  type: string
  default: 10rem
  description: "Any valid CSS max-height, e.g. 480px, 60vh, 32rem, min(70vh, 560px)."

# --- Behaviour ---
card_delay_ms:
  type: integer
  default: 300
  description: "Delay in milliseconds before the hover card appears."

enable_on_mobile:
  type: bool
  default: false
  description: "Enable tap-to-preview behavior on touch devices."

# --- Card sections ---
show_thumbnail:
  type: bool
  default: true
  description: "Display the topic thumbnail image when available."

thumbnail_placement:
  type: enum
  default: left
  choices:
    - top
    - left
    - right
    - bottom
  description: "Choose where the thumbnail appears on desktop. On mobile, the thumbnail is always shown at the top."

image_size_percent:
  type: integer
  default: 30
  min: 15
  max: 60
  description: "The thumbnail size as % of the Hover Card width. Valid range is 15 to 60. (For left and right thumbnail placements. Top and bottom placements are fixed at 100%)."

show_title:
  type: bool
  default: true
  description: "Display the topic title inside the card."

show_category:
  type: bool
  default: true
  description: "Display the topic's category inside the card."

show_tags:
  type: bool
  default: true
  description: "Display the topic's tags inside the card."

show_excerpt:
  type: bool
  default: true
  description: "Display a cleaned excerpt from the topic, excluding image metadata and captions."

excerpt_length:
  type: integer
  default: 3
  min: 1
  max: 12
  description: "The number of lines for the excerpt. Valid range is 1 to 12."

show_op:
  type: bool
  default: true
  description: "Display the original poster avatar and username."

# --- Metadata row ---
show_publish_date:
  type: bool
  default: true
  description: "Display the topic creation date."

show_views:
  type: bool
  default: true
  description: "Display the topic view count."

show_reply_count:
  type: bool
  default: true
  description: "Display the topic reply count."

show_likes:
  type: bool
  default: true
  description: "Display the topic like count."

show_activity:
  type: bool
  default: true
  description: "Display the most recent topic activity date."

# --- Enabled on ---

enable_on_topics:
  type: bool
  default: true
  description: "Show hover cards for topic links inside the original post."

enable_on_replies:
  type: bool
  default: true
  description: "Show hover cards for topic links inside replies."

enable_on_topic_lists:
  type: bool
  default: true
  description: "Show hover cards for topic links in topic lists."

enable_on_suggested_topic_links:
  type: bool
  default: true
  description: "Show hover cards for links in the suggested topics section."
