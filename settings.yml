# -------------------------------------------------------
# Discourse Topic Hover Cards — Settings
# -------------------------------------------------------

# --- Card dimensions ---
card_width:
  type: integer
  default: 420
card_max_height:
  type: integer
  default: 480

# --- Behaviour ---
card_delay_ms:
  type: integer
  default: 300
enable_on_mobile:
  type: bool
  default: false

# --- Card sections ---
show_thumbnail:
  type: bool
  default: true
show_excerpt:
  type: bool
  default: true
show_op:
  type: bool
  default: true

# --- Metadata row ---
show_publish_date:
  type: bool
  default: true
show_views:
  type: bool
  default: true
show_reply_count:
  type: bool
  default: true
show_likes:
  type: bool
  default: true
show_activity:
  type: bool
  default: true
