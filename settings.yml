card_width:
  type: string
  default: "32rem"

card_max_height:
  type: string
  default: "10rem"

card_delay_ms:
  type: integer
  default: 300

enable_on_mobile:
  type: bool
  default: false

enable_on_topics:
  type: bool
  default: true

enable_on_replies:
  type: bool
  default: true

enable_on_topic_lists:
  type: bool
  default: true

enable_on_suggested_topic_links:
  type: bool
  default: true

show_thumbnail:
  type: bool
  default: true

show_thumbnail_mobile:
  type: bool
  default: true

thumbnail_placement:
  type: enum
  default: left
  choices:
    - top
    - left
    - right
    - bottom

image_size_percent:
  type: integer
  default: 30
  min: 15
  max: 60

mobile_thumbnail_height:
  type: integer
  default: 160
  min: 80
  max: 320

show_category:
  type: bool
  default: true

show_category_mobile:
  type: bool
  default: true

show_tags:
  type: bool
  default: true

show_tags_mobile:
  type: bool
  default: true

show_title:
  type: bool
  default: true

show_title_mobile:
  type: bool
  default: true

show_excerpt:
  type: bool
  default: true

show_excerpt_mobile:
  type: bool
  default: true

excerpt_length:
  type: integer
  default: 3
  min: 1
  max: 12

excerpt_length_mobile:
  type: integer
  default: 3
  min: 1
  max: 12

show_op:
  type: bool
  default: true

show_op_mobile:
  type: bool
  default: true

show_publish_date:
  type: bool
  default: true

show_publish_date_mobile:
  type: bool
  default: true

show_views:
  type: bool
  default: true

show_views_mobile:
  type: bool
  default: true

show_reply_count:
  type: bool
  default: true

show_reply_count_mobile:
  type: bool
  default: true

show_likes:
  type: bool
  default: true

show_likes_mobile:
  type: bool
  default: true

show_activity:
  type: bool
  default: true

show_activity_mobile:
  type: bool
  default: true
