# -------------------------------------------------------
# Discourse Topic Hover Cards — Settings
# -------------------------------------------------------

# --- Card dimensions ---
card_width:
  type: string
  default: 420px
  description: "Any valid CSS width, e.g. 420px, 32rem, 40vw, clamp(18rem, 40vw, 28rem)"

card_max_height:
  type: string
  default: 480px
  description: "Any valid CSS max-height, e.g. 480px, 60vh, 32rem, min(70vh, 560px)"

# --- Behaviour ---
card_delay_ms:
  type: integer
  default: 300

enable_on_mobile:
  type: bool
  default: false

# --- Card sections ---
show_thumbnail:
  type: bool
  default: true

thumbnail_placement:
  type: enum
  default: top
  choices:
    - top
    - left
    - right
    - bottom

show_title:
  type: bool
  default: true

show_excerpt:
  type: bool
  default: true

show_op:
  type: bool
  default: true

# --- Metadata row ---
show_publish_date:
  type: bool
  default: true

show_views:
  type: bool
  default: true

show_reply_count:
  type: bool
  default: true

show_likes:
  type: bool
  default: true

show_activity:
  type: bool
  default: true
