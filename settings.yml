card_width:
  type: string
  default: "32rem"
  description: "Any valid CSS width value, such as 32rem, 420px, 40vw, or clamp(20rem, 40vw, 36rem)."

card_max_height:
  type: string
  default: "10rem"
  description: "Any valid CSS max-height value, such as 10rem, 480px, 50vh, or min(60vh, 32rem)."

card_delay_ms:
  type: integer
  default: 300
  min: 0
  max: 5000
  description: "Delay in milliseconds before the hover card appears."

enable_on_mobile:
  type: bool
  default: false
  description: "Enable tap-to-preview behavior on touch devices."

user_preference_field_name:
  type: string
  default: "disable_topic_hover_cards"
  description: "Custom user field key used to disable hover cards per user. Supports direct keys (e.g. disable_topic_hover_cards), numeric IDs (e.g. 1), and user_field_X keys (e.g. user_field_1)."

debug_mode:
  type: bool
  default: false
  description: "Log hover-card detection and user-field resolution details to the browser console for staff debugging."

resolve_user_field_id_for_admins:
  type: bool
  default: true
  description: "When enabled, admins can configure the preference field by name or user_field_X; the component resolves the numeric user-field ID via /admin/config/user-fields.json."

enable_on_topics:
  type: bool
  default: true
  description: "Show hover cards for internal topic links inside the original post."

enable_on_replies:
  type: bool
  default: true
  description: "Show hover cards for internal topic links inside replies."

enable_on_topic_lists:
  type: bool
  default: true
  description: "Show hover cards for internal topic links shown in standard topic list views (Latest, Top, category topic lists, tags, etc.)."

enable_on_category_homepage_topic_lists:
  type: bool
  default: true
  description: "Show hover cards for internal topic links shown in topic-list areas on category homepage layouts, including Categories + Latest layouts rendered at / or /categories."

enable_on_doc_categories:
  type: bool
  default: true
  description: "Show hover cards for internal topic links inside Discourse Doc Categories views and navigation areas (when available)."

enable_on_kanban_boards:
  type: bool
  default: true
  description: "Show hover cards for internal topic links inside Discourse Kanban board cards and board views (when available)."

enable_on_suggested_topic_links:
  type: bool
  default: true
  description: "Show hover cards for links in the suggested topics section."

show_thumbnail:
  type: bool
  default: true
  description: "Display the topic thumbnail image on desktop."

show_thumbnail_mobile:
  type: bool
  default: true
  description: "Display the topic thumbnail image on mobile."

thumbnail_placement:
  type: enum
  default: left
  choices:
    - top
    - left
    - right
    - bottom
  description: "Choose where the thumbnail appears."

density:
  type: enum
  default: default
  choices:
    - default
    - cozy
    - compact
  description: "Controls desktop hover card density. Matches the relative options used by Density Toggle: default, cozy, and compact."

density_mobile:
  type: enum
  default: default
  choices:
    - default
    - cozy
    - compact
  description: "Controls mobile hover card density. Matches the relative options used by Density Toggle: default, cozy, and compact."

image_size_percent:
  type: integer
  default: 30
  min: 15
  max: 60
  description: "Sets the image size as a percentage of the hover card size."

mobile_width_percent:
  type: integer
  default: 100
  min: 70
  max: 100
  description: "Controls the mobile preview width as a percentage of the viewport width."

mobile_thumbnail_height:
  type: integer
  default: 160
  min: 80
  max: 320
  description: "Controls the thumbnail height in pixels for the mobile bottom-sheet preview."

show_category:
  type: bool
  default: true
  description: "Display the topic category badge on desktop when category data is available."

show_category_mobile:
  type: bool
  default: true
  description: "Display the topic category badge on mobile when category data is available."

show_tags:
  type: bool
  default: true
  description: "Display topic tags on desktop when tag data is available."

show_tags_mobile:
  type: bool
  default: true
  description: "Display topic tags on mobile when tag data is available."

show_title:
  type: bool
  default: true
  description: "Display the topic title on desktop."

show_title_mobile:
  type: bool
  default: true
  description: "Display the topic title on mobile."

show_excerpt:
  type: bool
  default: true
  description: "Display a cleaned text excerpt from the topic on desktop."

show_excerpt_mobile:
  type: bool
  default: true
  description: "Display a cleaned text excerpt from the topic on mobile."

excerpt_length:
  type: integer
  default: 3
  min: 1
  max: 12
  description: "Number of excerpt lines to show on desktop."

excerpt_length_mobile:
  type: integer
  default: 2
  min: 1
  max: 12
  description: "Number of excerpt lines to show on mobile."

show_op:
  type: bool
  default: true
  description: "Display the original poster avatar and username in the metadata row on desktop."

show_op_mobile:
  type: bool
  default: true
  description: "Display the original poster avatar and username in the metadata row on mobile."

show_publish_date:
  type: bool
  default: true
  description: "Display the topic creation date on desktop."

show_publish_date_mobile:
  type: bool
  default: true
  description: "Display the topic creation date on mobile."

show_views:
  type: bool
  default: true
  description: "Display the topic view count on desktop."

show_views_mobile:
  type: bool
  default: true
  description: "Display the topic view count on mobile."

show_reply_count:
  type: bool
  default: true
  description: "Display the topic reply count on desktop."

show_reply_count_mobile:
  type: bool
  default: true
  description: "Display the topic reply count on mobile."

show_likes:
  type: bool
  default: true
  description: "Display the topic like count on desktop."

show_likes_mobile:
  type: bool
  default: true
  description: "Display the topic like count on mobile."

show_activity:
  type: bool
  default: true
  description: "Display the most recent topic activity date on desktop."

show_activity_mobile:
  type: bool
  default: true
  description: "Display the most recent topic activity date on mobile."
